<!DOCTYPE html>
<html>
<head>
    <title>Waze Clone Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        #map { height: 100vh; }
        .hud { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="hud" id="hud">Esperando GPS...</div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script>
        const map = L.map('map').setView([-34.60, -58.38], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let myMarker, control;
        
        navigator.geolocation.watchPosition(async (pos) => {
            const { latitude: lat, longitude: lng } = pos.coords;
            if(!myMarker) myMarker = L.marker([lat, lng]).addTo(map);
            else myMarker.setLatLng([lat, lng]);

            await fetch('/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: 'me', lat, lng })
            });
        });

        map.on('click', (e) => {
            if(control) map.removeControl(control);
            control = L.Routing.control({
                waypoints: [myMarker.getLatLng(), e.latlng],
                router: L.Routing.osrmv1()
            }).on('routesfound', (e) => {
                const route = e.routes[0];
                const eta = Math.round(route.summary.totalTime / 60);
                document.getElementById('hud').innerHTML = `Llegada: ${eta} min | ${Math.round(route.summary.totalDistance/1000)} km`;
            }).addTo(map);
        });

        // Sincronizar usuarios y eventos
        setInterval(async () => {
            const res = await fetch('/data');
            const { users, reports } = await res.json();
            // Lógica para renderizar puntos rojos y reportes
            reports.forEach(r => L.marker([r.lat, r.lng]).bindPopup(r.type).addTo(map));
        }, 3000);
    </script>
</body>
</html>
