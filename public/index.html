<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegación Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        body, html { height: 100%; margin: 0; }
        #map { height: 100vh; width: 100%; }
        .hud { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="hud">
        <input type="text" id="dest" placeholder="Dirección de destino...">
        <button onclick="navegar()">Calcular Ruta</button>
    </div>
    <div id="map"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        const socket = io();
        let map = null;
        let myMarker = null;
        let routingControl = null;

        // 1. Iniciar mapa en la ubicación real del usuario al cargar
        navigator.geolocation.getCurrentPosition((pos) => {
            const { latitude, longitude } = pos.coords;
            map = L.map('map').setView([latitude, longitude], 16);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            myMarker = L.marker([latitude, longitude]).addTo(map).bindPopup("Estás aquí").openPopup();
        }, () => { alert("No se pudo obtener tu ubicación"); }, { enableHighAccuracy: true });

        // 2. Calcular la ruta más corta (Shortest Path)
        async function navegar() {
            const q = document.getElementById('dest').value;
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await res.json();
            
            if(data.length > 0 && myMarker) {
                const destino = L.latLng(data[0].lat, data[0].lon);
                
                if(routingControl) map.removeControl(routingControl);
                
                // OSRM calcula automáticamente la ruta más corta (shortest path)
                routingControl = L.Routing.control({
                    waypoints: [myMarker.getLatLng(), destino],
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://router.project-osrm.org/route/v1'
                    }),
                    lineOptions: { styles: [{ color: 'blue', weight: 6, opacity: 0.8 }] },
                    showAlternatives: true // Muestra rutas alternativas si existen
                }).addTo(map);
            }
        }
    </script>
</body>
</html>
