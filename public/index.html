<div class="search-box" style="position:absolute; top:10px; z-index:1000; left:50px;">
    <input type="text" id="address" placeholder="Buscar destino...">
    <button onclick="buscarDestino()">Ir</button>
</div>

<script>
    // 1. Lógica de búsqueda
    async function buscarDestino() {
        const query = document.getElementById('address').value;
        const res = await fetch(`/search?q=${query}`);
        const data = await res.json();
        if(data.length > 0) {
            const { lat, lon } = data[0];
            map.flyTo([lat, lon], 18); // Zoom 18 es "modo casa"
        }
    }

    // 2. Acercamiento Infinito (Modo Precisión)
    // Cuando el usuario hace zoom máximo, el mapa carga capas vectoriales
    map.on('zoomend', () => {
        if (map.getZoom() > 18) {
            // Aquí activarías una capa de "Edificios en 3D" o plano interno
            console.log("Modo Precisión Activo");
        }
    });
</script>
