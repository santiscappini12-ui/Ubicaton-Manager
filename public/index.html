<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ubicaton Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        body, html { height: 100%; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .ui { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 10px; }
    </style>
</head>
<body>
    <div class="ui">
        <input type="text" id="dest" placeholder="Buscar destino...">
        <button onclick="buscar()">Ir</button>
    </div>
    <div id="map"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        const socket = io();
        // Inicialización forzada
        const map = L.map('map', { preferCanvas: true }).setView([-34.60, -58.38], 15);
        
        // Uso de una URL de tiles más confiable
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let myMarker, routingControl;
        const others = {};

        // Forzar ubicación
        navigator.geolocation.watchPosition((pos) => {
            const { latitude, longitude } = pos.coords;
            if(!myMarker) {
                myMarker = L.marker([latitude, longitude]).addTo(map);
                map.setView([latitude, longitude], 15);
            } else {
                myMarker.setLatLng([latitude, longitude]);
            }
            socket.emit('update-location', { lat: latitude, lng: longitude });
        }, (err) => console.error("Error GPS:", err), { enableHighAccuracy: true });

        socket.on('user-moved', (data) => {
            if(!others[data.id]) others[data.id] = L.circleMarker([data.lat, data.lng], {color: 'red'}).addTo(map);
            else others[data.id].setLatLng([data.lat, data.lng]);
        });

        async function buscar() {
            const q = document.getElementById('dest').value;
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await res.json();
            if(data.length > 0) {
                const { lat, lon } = data[0];
                map.flyTo([lat, lon], 18);
                if(routingControl) map.removeControl(routingControl);
                routingControl = L.Routing.control({
                    waypoints: [myMarker.getLatLng(), L.latLng(lat, lon)],
                    router: L.Routing.osrmv1()
                }).addTo(map);
            }
        }
    </script>
</body>
</html>
