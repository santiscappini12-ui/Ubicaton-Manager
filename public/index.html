<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>#map { height: 100vh; }</style>
</head>
<body>
    <div id="map"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const socket = io();
        const map = L.map('map').setView([0, 0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let myMarker;
        const others = {};

        // 1. Geolocalización en tiempo real
        navigator.geolocation.watchPosition((pos) => {
            const { latitude: lat, longitude: lng } = pos.coords;
            if(!myMarker) myMarker = L.marker([lat, lng]).addTo(map);
            else myMarker.setLatLng([lat, lng]);
            map.setView([lat, lng]);

            // Enviar por socket (mucho más rápido que fetch)
            socket.emit('update-location', { lat, lng });
        });

        // 2. Recibir a los demás instantáneamente
        socket.on('other-user', (data) => {
            if(!others[data.id]) {
                others[data.id] = L.circleMarker([data.lat, data.lng], {color: 'red'}).addTo(map);
            } else {
                others[data.id].setLatLng([data.lat, data.lng]);
            }
        });
    </script>
</body>
</html>
