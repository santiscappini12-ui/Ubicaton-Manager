<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>#map { height: 100vh; }</style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const myId = Math.random().toString(36).substr(2, 9);
        const markers = {};

        navigator.geolocation.watchPosition(async (pos) => {
            const { latitude: lat, longitude: lng } = pos.coords;
            await fetch('/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: myId, lat, lng })
            });
            map.setView([lat, lng], 15);
        });

        setInterval(async () => {
            const res = await fetch('/all');
            const data = await res.json();
            for (let id in data) {
                if (id === myId) continue;
                if (!markers[id]) markers[id] = L.marker([data[id].lat, data[id].lng], {
                    icon: L.divIcon({ html: '<div style="background:red;width:15px;height:15px;border-radius:50%"></div>' })
                }).addTo(map);
                else markers[id].setLatLng([data[id].lat, data[id].lng]);
            }
        }, 2000);
    </script>
</body>
</html>
