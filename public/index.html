<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        body, html { height: 100%; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .hud { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="hud">
        <input type="text" id="dest" placeholder="Buscar destino...">
        <button onclick="buscar()">Ir</button>
    </div>
    <div id="map"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        const socket = io();
        const map = L.map('map', { preferCanvas: true }).setView([0, 0], 18);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);

        let myMarker, routingControl;
        const others = {};

        // Seguimiento AAA
        navigator.geolocation.watchPosition((pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            
            if(!myMarker) myMarker = L.marker([lat, lng]).addTo(map);
            myMarker.setLatLng([lat, lng]);
            
            // Cámara automática (Sigue tu posición)
            map.setView([lat, lng], map.getZoom());
            
            socket.emit('update-location', { lat, lng });
        }, null, { enableHighAccuracy: true });

        // Radar de personas cercanas
        socket.on('user-moved', (data) => {
            if(!others[data.id]) others[data.id] = L.circleMarker([data.lat, data.lng], {color: 'red'}).addTo(map);
            else others[data.id].setLatLng([data.lat, data.lng]);
            
            // Mostrar distancia si están a menos de 50 metros
            const dist = myMarker.getLatLng().distanceTo([data.lat, data.lng]);
            if(dist < 50) console.log("Alguien está en tu casa!");
        });

        async function buscar() {
            const q = document.getElementById('dest').value;
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await res.json();
            if(data.length > 0) {
                const { lat, lon } = data[0];
                if(routingControl) map.removeControl(routingControl);
                routingControl = L.Routing.control({
                    waypoints: [myMarker.getLatLng(), L.latLng(lat, lon)],
                    router: L.Routing.osrmv1()
                }).addTo(map);
            }
        }
    </script>
</body>
</html>
